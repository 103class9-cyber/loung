<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>閒人案內所 ｜ 官方傳送門</title>
    <style>
        :root {
            --bg-dark: #050308;
            --neon-gold: #ffb020;
            --neon-purple: #b366ff;
            --neon-pink: #ff2a6d;
            --text-light: #ffffff;
            --text-gray: #9c97aa;
            --card-glass: rgba(16, 12, 30, 0.72);
            --border-glow: rgba(179, 102, 255, 0.18);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-light); min-height: 100vh; padding: 40px 12px; }
        .container { width: 100%; max-width: 460px; margin: 0 auto; text-align: center; }
        .logo-container { position: relative; width: 96px; height: 96px; margin: 0 auto 20px; }
        .logo-pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, var(--neon-purple), #00f0ff); filter: blur(14px); opacity: 0.85; }
        .logo-inner { position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; background: #0c061a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 44px; border: 1px solid rgba(255, 255, 255, 0.14); }
        .title { font-size: 30px; font-weight: 900; letter-spacing: 5px; margin-bottom: 20px; color: #fff; }
        .tab-navigation { display: flex; background: rgba(8, 5, 18, 0.75); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 20px; padding: 5px; margin-bottom: 30px; gap: 3px; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: var(--text-gray); font-weight: 700; border-radius: 14px; cursor: pointer; }
        .tab-btn.active { color: #fff; background: rgba(179, 102, 255, 0.38); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .card-box { background: var(--card-glass); border: 1px solid var(--border-glow); border-radius: 30px; padding: 28px 22px; margin-bottom: 28px; }
        .room-item, .talk-item { padding: 20px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; margin-bottom: 12px; display: block; text-decoration: none; color: white; font-weight: 700; }
        
        /* 滿房樣式 */
        .busy { border-color: var(--neon-pink) !important; background: rgba(255, 42, 109, 0.15) !important; position: relative; pointer-events: none; opacity: 0.75; }
        .busy::after { content: '● BUSY'; position: absolute; top: 10px; right: 15px; font-size: 10px; color: var(--neon-pink); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-container"><div class="logo-pulse"></div><div class="logo-inner">👻</div></div>
            <h1 class="title">閒人案內所</h1>
        </div>
        <div class="tab-navigation">
            <button class="tab-btn active" onclick="switchTab('home')">主頁</button>
            <button class="tab-btn" onclick="switchTab('rooms')">VIP 招待所</button>
        </div>
        <div id="panel-home" class="tab-panel active">
            <div class="card-box">歡迎來到案內所，請選擇您的服務。</div>
        </div>
        <div id="panel-rooms" class="tab-panel">
            <div class="card-box">
                <a href="#" class="room-item" data-room="101">101 ROOM</a>
                <a href="#" class="talk-item" data-talk="1">尊榮線上對談 1</a>
            </div>
        </div>
    </div>
    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick*="${tabId}"]`).classList.add('active');
            document.getElementById('panel-' + tabId).classList.add('active');
        }
    </script>
</body>
</html>
